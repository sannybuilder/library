<h5>{{ "ui.scm.editRefs" | translate }}</h5>

<scl-key-value-editor
  [entries]="refs"
  [filterPlaceholder]="'ui.scm.filterRefs' | translate"
  [addButtonText]="'ui.scm.addRef' | translate"
  [emptyText]="'ui.scm.emptyRefList' | translate"
  [requiredPrefix]="['ref.']"
  (entriesChange)="onEntriesChange($event)"
  (hasError)="onHasError($event)"
></scl-key-value-editor>
