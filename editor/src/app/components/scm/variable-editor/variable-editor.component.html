<h5>{{ 'ui.scm.editVars' | translate }}</h5>

<scl-key-value-editor
  [entries]="variables"
  [filterPlaceholder]="'ui.scm.filterVars' | translate"
  [addButtonText]="'ui.scm.addVar' | translate"
  [emptyText]="'ui.scm.emptyVarList' | translate"
  [requiredPrefix]="['g.', 'l.']"
  (entriesChange)="onEntriesChange($event)"
  (hasError)="onHasError($event)"
></scl-key-value-editor>
